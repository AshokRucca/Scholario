<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Scholario</title>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/pages/dashboard.css">
    <link rel="stylesheet" href="css/pages/profile.css">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body class="dashboard-body bg-main">

    <aside class="sidebar glass-card">
        <div class="sidebar-header">
            <a href="index.html" class="logo flex items-center gap-sm">
                <i class="ph ph-graduation-cap text-primary" style="font-size: 2rem;"></i>
                <span class="logo-text text-primary"
                    style="font-family: var(--font-heading); font-weight: 700; font-size: 1.25rem;">Scholario</span>
            </a>
            <button class="close-sidebar-btn md-hidden"><i class="ph ph-x"></i></button>
        </div>

        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="ph ph-squares-four"></i>
                        Dashboard</a></li>
                <li class="nav-item"><a href="eligibility.html" class="nav-link"><i class="ph ph-check-circle"></i>
                        Eligibility Checker</a></li>
                <li class="nav-item"><a href="scholarships.html" class="nav-link"><i class="ph ph-magnifying-glass"></i>
                        Scholarships</a></li>
                <li class="nav-item"><a href="applications.html" class="nav-link"><i class="ph ph-file-text"></i> My
                        Applications</a></li>
                <li class="nav-item"><a href="profile.html" class="nav-link active"><i class="ph ph-user"></i>
                        Profile</a></li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <a href="#" onclick="logout(); return false;" class="nav-link text-danger"><i class="ph ph-sign-out"></i>
                Logout</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar flex justify-between items-center glass-card">
            <div class="flex items-center gap-md">
                <button class="toggle-sidebar-btn"><i class="ph ph-list"></i></button>
                <h2 style="font-size: 1.5rem; margin: 0;">My Profile</h2>
            </div>
            <button class="btn btn-primary animate-fade-in-up" id="save-changes-btn" onclick="saveProfile()">Save
                Changes</button>
        </header>

        <div class="content-padding profile-page-container">

            <!-- Avatar -->
            <div class="profile-avatar-wrapper animate-fade-in-up delay-100">
                <img src="https://i.pravatar.cc/120?img=12" class="profile-avatar" alt="Profile picture"
                    id="profile-avatar-img">
                <button class="edit-pic-btn" id="edit-pic-btn" title="Change profile picture">
                    <i class="ph ph-camera"></i>
                </button>
                <input type="file" id="avatar-file-input" accept="image/*" style="display: none;">
            </div>

            <!-- Personal Information -->
            <div class="profile-card animate-fade-in-up delay-200">
                <h3 class="profile-card-title">Personal Information</h3>
                <div class="profile-form-grid">
                    <div class="profile-form-group">
                        <label for="pi-name" class="profile-form-label">Full Name</label>
                        <input type="text" class="profile-form-input" id="pi-name" value="John Doe">
                    </div>
                    <div class="profile-form-group">
                        <label for="pi-email" class="profile-form-label">Email</label>
                        <input type="email" class="profile-form-input" id="pi-email" value="john.doe@example.com"
                            disabled>
                    </div>
                    <div class="profile-form-group">
                        <label for="pi-phone" class="profile-form-label">Mobile Number</label>
                        <input type="tel" class="profile-form-input" id="pi-phone" value="+91 9876543210">
                    </div>
                    <div class="profile-form-group">
                        <label for="pi-address" class="profile-form-label">Address</label>
                        <input type="text" class="profile-form-input" id="pi-address" value="123 Main St, New Delhi">
                    </div>
                </div>
            </div>

            <!-- Academic Information -->
            <div class="profile-card animate-fade-in-up delay-300">
                <h3 class="profile-card-title">Academic Information</h3>
                <div class="profile-form-grid">
                    <div class="profile-form-group">
                        <label for="ai-course" class="profile-form-label">Course Name</label>
                        <input type="text" class="profile-form-input" id="ai-course" value="B.Tech Computer Science">
                    </div>
                    <div class="profile-form-group">
                        <label for="ai-inst" class="profile-form-label">Institution</label>
                        <input type="text" class="profile-form-input" id="ai-inst"
                            value="National Institute of Technology">
                    </div>
                    <div class="profile-form-group">
                        <label for="ai-year" class="profile-form-label">Current Year</label>
                        <select class="profile-form-input" id="ai-year">
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3" selected>3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                    <div class="profile-form-group">
                        <label for="ai-gpa" class="profile-form-label">CGPA / Percentage</label>
                        <input type="text" class="profile-form-input" id="ai-gpa" value="8.5">
                    </div>
                </div>
            </div>



            <!-- Danger Zone -->
            <div class="profile-card animate-fade-in-up delay-500" style="border: 1px solid var(--danger);">
                <h3 class="profile-card-title"
                    style="color: var(--danger); display: flex; align-items: center; gap: 0.5rem;">
                    <i class="ph ph-warning-circle" style="font-size: 1.5rem;"></i> Danger Zone
                </h3>
                <p style="margin-bottom: 1.5rem; color: var(--text-secondary);">Deleting your account is permanent and
                    cannot be undone. All your applications and saved scholarships will be lost.</p>
                <div class="flex gap-sm">
                    <button class="btn btn-danger-outline" id="delete-account-btn"
                        style="background: var(--danger); color: white; border: none;"
                        onclick="confirmDeleteAccount()">Delete Account</button>
                    <button class="btn" id="cancel-delete-btn" style="background: #E2E8F0; color: #1E293B;"
                        onclick="cancelDelete()">Cancel</button>
                </div>
            </div>

        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script>
        /* ---------- Toggle switch (notification preferences) ---------- */
        document.querySelector('.toggle-switch input').addEventListener('change', function () {
            const dot = this.parentElement.querySelector('.slider-dot');
            const slider = this.parentElement.querySelector('.slider');
            if (this.checked) {
                dot.style.left = '22px';
                slider.style.backgroundColor = 'var(--primary)';
            } else {
                dot.style.left = '4px';
                slider.style.backgroundColor = 'var(--border-color)';
            }
        });

        /* ---------- Save Changes (Personal + Academic info) ---------- */
        function saveProfile() {
            const name = document.getElementById('pi-name').value.trim();
            const phone = document.getElementById('pi-phone').value.trim();
            const address = document.getElementById('pi-address').value.trim();
            const course = document.getElementById('ai-course').value.trim();
            const institution = document.getElementById('ai-inst').value.trim();
            const gpa = document.getElementById('ai-gpa').value.trim();

            if (!name || !phone || !address || !course || !institution || !gpa) {
                alert('Please fill in all fields before saving.');
                return;
            }

            // TODO: replace with a real API call, e.g.
            // fetch('/api/profile', { method: 'PUT', body: JSON.stringify({...}) })
            alert('Profile Updated!');
        }

        /* ---------- Change Password ---------- */
        function updatePassword() {
            const oldPassInput = document.getElementById('as-old-pass');
            const newPassInput = document.getElementById('as-new-pass');
            const errorEl = document.getElementById('password-error');
            const oldPass = oldPassInput.value;
            const newPass = newPassInput.value;

            const showError = (msg) => {
                errorEl.textContent = msg;
                errorEl.style.display = 'block';
            };

            errorEl.style.display = 'none';

            if (!oldPass || !newPass) {
                showError('Please fill in both password fields.');
                return;
            }
            if (newPass.length < 8) {
                showError('New password must be at least 8 characters long.');
                return;
            }
            if (oldPass === newPass) {
                showError('New password must be different from the current password.');
                return;
            }

            // TODO: replace with a real API call to verify oldPass and set newPass
            alert('Password updated successfully!');
            oldPassInput.value = '';
            newPassInput.value = '';
        }

        /* ---------- Danger Zone: Delete Account ---------- */
        function confirmDeleteAccount() {
            const confirmed = confirm('Are you sure you want to delete your account? This action is permanent and cannot be undone.');
            if (!confirmed) return;

            const typed = prompt('Type DELETE to confirm account deletion:');
            if (typed !== 'DELETE') {
                alert('Account deletion cancelled — confirmation text did not match.');
                return;
            }

            // TODO: replace with a real API call, e.g.
            // fetch('/api/account', { method: 'DELETE' }).then(() => window.location.href = 'index.html');
            alert('Your account has been deleted.');
        }

        function cancelDelete() {
            // Resets any in-progress account-deletion state. Currently a no-op
            // since there is no modal/confirmation panel open by default.
            console.log('Account deletion cancelled.');
        }

        /* ---------- Avatar upload ---------- */
        document.getElementById('edit-pic-btn').addEventListener('click', function () {
            document.getElementById('avatar-file-input').click();
        });

        document.getElementById('avatar-file-input').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                alert('Please select a valid image file.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (ev) {
                document.getElementById('profile-avatar-img').src = ev.target.result;
            };
            reader.readAsDataURL(file);

            // TODO: upload `file` to the server here
        });
    </script>
</body>

</html>
